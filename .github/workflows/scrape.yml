name: Hachiroko Gate Scraper

on:
  workflow_dispatch:
  repository_dispatch:         # 🌟 ここが追加したインターホン！
    types: [run-scraper]       # 🌟 合言葉は「run-scraper」

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonの準備 (バージョン3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install playwright firebase-admin
        playwright install chromium

    - name: 暗号ポケットからFirebaseの鍵を復元
      run: |
        echo '${{ secrets.FIREBASE_KEY_SECRET }}' > firebase_key.json

    - name: スクレイピングを実行
      run: python scrape_test.py
