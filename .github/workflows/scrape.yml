name: Scrape Hachiroko Gate

# 5分おきに自動実行するタイマー設定
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動で実行できるボタンも用意

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: コードの読み込み
        uses: actions/checkout@v3

      - name: Pythonの準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なパーツのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Firebaseの秘密鍵を作成する
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY_JSON }}
        run: |
          echo "$FIREBASE_KEY" > firebase_key.json

      - name: Pythonプログラムの実行！
        run: python scraper.py
